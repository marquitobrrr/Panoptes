version: '3.8'

services:
  influxdb:
    image: influxdb:2
    container_name: argus-influxdb
    ports:
      - "8086:8086"
    volumes:
      - ./database_data:/var/lib/influxdb2
    environment:
      - DOCKER_INFLUXDB_INIT_MODE=setup
      - DOCKER_INFLUXDB_INIT_USERNAME=admin
      - DOCKER_INFLUXDB_INIT_PASSWORD=arguspassword123
      - DOCKER_INFLUXDB_INIT_ORG=argus
      - DOCKER_INFLUXDB_INIT_BUCKET=telemetry
      - DOCKER_INFLUXDB_INIT_ADMIN_TOKEN=argus-super-secret-token
    networks:
      - argus-network
    restart: unless-stopped

  backend:
    build:
      context: ./backend
    container_name: argus-backend
    ports:
      - "8000:8000"
    volumes:
      - ./backend/app:/app
    depends_on:
      - influxdb
    networks:
      - argus-network
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
    container_name: argus-frontend
    ports:
      - "5173:5173"
    volumes:
      # Montamos el código fuente para poder editarlo en caliente
      - ./frontend:/app
      # Evitamos que la carpeta vacía de Windows sobreescriba los node_modules del contenedor
      - /app/node_modules
    depends_on:
      - backend
    networks:
      - argus-network
    restart: unless-stopped

networks:
  argus-network:
    driver: bridge
